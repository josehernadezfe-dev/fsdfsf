<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Urban Kicks</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

<h1>Urban Kicks</h1>

<button onclick="abrirCarrito()">
🛒 (<span id="count">0</span>)
</button>

<a href="/admin">Admin</a>

</header>

<!-- 🔍 CONTROLES -->
<section class="controls">

<input type="text" id="buscar" placeholder="Buscar zapatillas...">

<select id="filtroMarca">
<option value="todas">Todas</option>
<option>Nike</option>
<option>Adidas</option>
<option>Jordan</option>
<option>Puma</option>
</select>

<input type="number" id="precioMax" placeholder="Precio máximo">

</section>

<section class="grid" id="contenedor-productos"></section>

<!-- 🛒 CARRITO -->
<div id="carrito" class="carrito">

<h2>Tu carrito</h2>

<div id="items"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="cerrarCarrito()">Cerrar</button>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
